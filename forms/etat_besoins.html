<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Etat de Besoins — Labo Nedjma</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Poppins:wght@400;500;600;700;800;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}

  :root {
    --primary: #0056b3;
    --secondary: #10b981;
    --accent: #f59e0b; /* Orange for urgency */
    --danger: #ef4444; /* Red for high urgency */
    --text-dark: #1e293b;
    --text-light: #64748b;
  }

  body{
    font-family:'Poppins',sans-serif;
    background-color:#0f172a;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:30px 10px;
    min-height:100vh;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image: linear-gradient(rgba(15, 23, 42, 0.85), rgba(15, 23, 42, 0.85)), url('../assets/bg.png');
    background-size: cover;
    background-position: center;
    filter: blur(25px);
    z-index: -1;
    transform: scale(1.1);
  }

  .toolbar{width:210mm;max-width:100%;display:flex;gap:10px;margin-bottom:15px;justify-content:flex-end;align-items:center}
  .toolbar button{padding:10px 20px;border-radius:10px;font-size:.85rem;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;gap:8px;box-shadow: 0 4px 15px rgba(0,0,0,0.3);}
  .btn-print{background:linear-gradient(135deg, #2563eb, #10b981);color:#fff}
  .btn-clear{background:rgba(255,255,255,0.1);color:#fff;border:1px solid rgba(255,255,255,0.2);backdrop-filter:blur(10px)}

  .page{
    width:210mm;
    height:297mm;
    background:#ffffff !important; /* Force pure white for paper */
    padding:12mm 15mm;
    display:flex;
    flex-direction:column;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    position: relative;
    z-index: 1;
    overflow: hidden;
  }

  /* Premium Geometric Shapes */
  .shape-tr{position:absolute;top:0;right:0;width:200px;height:200px;background:radial-gradient(circle at top right, rgba(0,86,179,0.08) 0%, transparent 70%);pointer-events:none;z-index:1}
  .shape-bl{position:absolute;bottom:0;left:0;width:250px;height:250px;background:radial-gradient(circle at bottom left, rgba(16,185,129,0.06) 0%, transparent 70%);pointer-events:none;z-index:1}
  
  .watermark{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    font-size: 35rem;
    color: var(--primary);
    opacity: 0.025;
    z-index: 1;
    pointer-events: none;
  }

  /* Standard System Header */
  .form-header{display:grid;grid-template-columns:220px 1fr 180px;border:3px solid #0056b3;border-radius:12px;overflow:hidden;margin-bottom:6mm;}
  .logo-cell{padding:5px;border-right:3px solid #0056b3;display:flex;align-items:center;justify-content:center;background:#003399} /* Matching logo blue */
  .header-logo-img { width: 100%; height: auto; border-radius: 4px; }
  
  .title-cell{text-align:center;padding:5px;display:flex;flex-direction:column;justify-content:center;background:#fff}
  .title-fr{font-size:1.15rem;font-weight:900;color:var(--primary);margin-bottom:0}
  .title-ar{font-family:'Cairo',sans-serif;font-size:0.9rem;font-weight:900;color:#1e293b}

  .meta-cell{padding:5px;border-left:3px solid var(--primary);background:#f0f7ff;display:flex;flex-direction:column;justify-content:center;gap:3px}
  .meta-row{font-size:.65rem;font-weight:800;color:var(--primary);display:flex;align-items:center;gap:4px;margin-bottom:1px}
  .meta-input{flex:1;border:none;border-bottom:1px solid #94a3b8;background:transparent;height:12px;font-size:.7rem;font-weight:700;color:#1e293b;outline:none;padding:0 2px;width:100%}

  /* Info Bar */
  .info-bar{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    margin-bottom:8mm;
    position:relative;
    z-index:2;
    background: #f8fafc;
    padding: 15px 20px;
    border-radius: 12px;
    border: 2px solid var(--primary);
  }
  .info-group{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .info-label{
    font-size:1rem;
    font-weight:900;
    color:var(--primary);
  }
  .info-input{
    border:none;
    border-bottom:2.5px solid var(--secondary);
    background:transparent;
    font-size:1.1rem;
    font-weight:900;
    outline:none;
    padding:2px 8px;
    font-family:inherit;
    color:var(--text-dark);
  }



  /* Table */
  .table-wrapper{
    position:relative;
    z-index:2;
  }
  .styled-table{
    width:100%;
    border-collapse:collapse;
    border:2px solid var(--primary);
    border-radius:8px;
    overflow:hidden;
    box-shadow: 0 4px 6px rgba(0,0,0,0.02);
  }
  .styled-table th{
    background:var(--primary);
    border:1px solid var(--primary);
    padding:12px;
    font-size:.9rem;
    font-weight:800;
    color:#fff;
    text-align:center;
    text-transform:uppercase;
    letter-spacing:0.5px;
  }
  .styled-table td{
    border:1px solid #cbd5e1;
    height:42px;
    padding:0;
  }
  .styled-table tr:nth-child(even) td{background:rgba(240,247,255,0.5)}
  .styled-table tr:hover td{background:rgba(16,185,129,0.05)}

  .styled-table th:nth-child(1){width:6%}
  .styled-table th:nth-child(2){width:45%}
  .styled-table th:nth-child(3){width:12%}
  .styled-table th:nth-child(4){width:37%}

  .cell-input{
    width:100%;
    height:100%;
    border:none;
    background:transparent;
    outline:none;
    padding:0 8px;
    font-family:inherit;
    font-size:.9rem;
    font-weight:600;
    color:var(--text-dark);
    text-align:center;
  }
  .styled-table td:nth-child(2) .cell-input{text-align:left}
  
  .row-num{
    text-align:center;
    font-weight:800;
    color:var(--primary);
    font-size:.95rem;
  }

  /* General Observation Box */
  .obs-box{
    margin-top:6mm;
    border:2px solid #e2e8f0;
    border-radius:10px;
    padding:10px;
    position:relative;
    z-index:2;
    background:#fff;
  }
  .obs-title{
    font-size:.85rem;
    font-weight:800;
    color:var(--primary);
    margin-bottom:5px;
    display:flex;
    align-items:center;
    gap:5px;
  }
  .obs-input{
    width:100%;
    border:none;
    resize:none;
    font-family:inherit;
    font-size:.9rem;
    font-weight:500;
    color:var(--text-dark);
    outline:none;
    height:40px;
  }

  /* Signatures */
  .signatures{
    display:flex;
    justify-content:space-between;
    margin-top:auto;
    margin-bottom:0;
    padding:0 20px;
    position:relative;
    z-index:2;
  }
  .sig-block{
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .sig-title{
    font-size:.95rem;
    font-weight:800;
    color:var(--primary);
    position:relative;
    padding-bottom:5px;
    margin-bottom:30px;
  }
  .sig-title::after{
    content:'';
    position:absolute;
    bottom:-4px;
    left:10%;
    width:80%;
    height:2px;
    background:var(--primary);
  }
  .sig-line{
    width:150px;
    border-bottom:2px dotted #cbd5e1;
  }

  /* Footer */
  .footer{
    margin-top: auto;
    padding-top: 4mm;
    border-top: 1px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    font-size: .65rem;
    font-weight: 800;
    color: #94a3b8;
    flex-shrink: 0;
    position:relative;
    z-index:2;
  }

  @media print {
    @page { size: A4 portrait; margin: 0; }
    body { background: white; padding: 0; margin: 0; }
    .toolbar { display: none; }
    .page { box-shadow: none !important; width: 210mm; height: 297mm; padding: 12mm 15mm; margin: 0 auto; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    .watermark { color: #000 !important; opacity: 0.03 !important; }
    .info-bar { background: transparent !important; border: none !important; }
    .row-num { background: transparent !important; }
  }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

<div class="toolbar">
  <button class="btn-clear" onclick="clearForm()">🔄 Réinitialiser</button>
  <button class="btn-print" onclick="handlePrint()">🖨️ Imprimer</button>
</div>

<div class="page">
  <div class="shape-tr"></div>
  <div class="shape-bl"></div>
  <i class="fas fa-star watermark"></i>

  <!-- Standard System Header -->
  <div class="form-header">
    <div class="logo-cell">
      <img src="../assets/logo.png" alt="Labo Nedjma" class="header-logo-img">
    </div>
    <div class="title-cell">
      <div class="title-fr">Etat de Besoins</div>
      <div class="title-ar">بيان الإحتياجات</div>
    </div>
    <div class="meta-cell">
      <div class="meta-row">Date: <input type="text" class="meta-input" id="h_date" dir="auto"></div>
      <div class="meta-row">Réf: <input type="text" class="meta-input" id="h_ref" dir="auto"></div>
      <div class="meta-row">Sce: <input type="text" class="meta-input" id="h_sce" dir="auto" value="MGX"></div>
    </div>
  </div>

  <!-- Top Info -->
  <div class="info-bar">
    <div class="info-group">
      <i class="fas fa-building" style="color:var(--primary); margin-bottom:4px"></i>
      <span class="info-label">Service :</span>
      <input type="text" id="service" class="info-input" style="width:250px" dir="auto">
    </div>
    <div class="info-group">
      <i class="fas fa-calendar-alt" style="color:var(--primary); margin-bottom:4px"></i>
      <span class="info-label">Larbaa le :</span>
      <input type="text" id="date" class="info-input" style="width:140px; text-align:center;" dir="auto">
    </div>
  </div>

  <!-- Table -->
  <div class="table-wrapper">
    <table class="styled-table">
      <thead>
        <tr>
          <th>N°</th>
          <th>Désignation</th>
          <th>Qté</th>
          <th>OBS</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- Generates 8 rows for better spacing -->
      </tbody>
    </table>
  </div>

  <!-- General Observation -->
  <div class="obs-box">
    <div class="obs-title"><i class="fas fa-comment-dots"></i> Remarques Générales / Justification :</div>
    <textarea class="obs-input" id="obs_gen" dir="auto" placeholder="Ajoutez une remarque générale si nécessaire..."></textarea>
  </div>

  <!-- Signatures -->
  <div class="signatures">
    <div class="sig-block">
      <div class="sig-title">Le Demandeur</div>
      <div class="sig-line"></div>
    </div>
    <div class="sig-block">
      <div class="sig-title">Responsable du Service</div>
      <div class="sig-line"></div>
    </div>
    <div class="sig-block">
      <div class="sig-title">Assistante MGX</div>
      <div class="sig-line"></div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <span>LABO - NEDJMA LABORATOIRES-COSMETIQUES</span>
    <span>ETAT DE BESOINS &nbsp;&nbsp;&mdash;&nbsp;&nbsp; PAR DEVELOPER IT BILLEL BOURABA</span>
    <span id="fDate"></span>
  </div>

</div>

<script>
  // Generate Table Rows
  const tbody = document.getElementById('tableBody');
  for(let i=1; i<=8; i++) {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="row-num">${i}</td>
      <td><input type="text" class="cell-input" id="des_${i}" dir="auto"></td>
      <td><input type="text" class="cell-input" id="qte_${i}" dir="auto"></td>
      <td><input type="text" class="cell-input" id="obs_${i}" dir="auto"></td>
    `;
    tbody.appendChild(tr);
  }

  // Set Default Dates & Values
  const todayLocal = new Date().toLocaleDateString('fr-FR');
  const dateInput = document.getElementById('date');
  const hDateInput = document.getElementById('h_date');
  
  if(!dateInput.value) dateInput.value = todayLocal;
  if(!hDateInput.value) hDateInput.value = todayLocal;
  document.getElementById('fDate').textContent = todayLocal;

  function clearForm() {
    document.getElementById('service').value = '';
    document.getElementById('obs_gen').value = '';
    dateInput.value = todayLocal;
    hDateInput.value = todayLocal;
    document.getElementById('h_ref').value = '';
    
    for(let i=1; i<=8; i++) {
      document.getElementById('des_'+i).value = '';
      document.getElementById('qte_'+i).value = '';
      document.getElementById('obs_'+i).value = '';
    }
  }
  function handlePrint() {
    const params = new URLSearchParams();
    const inputs = document.querySelectorAll('input, select, textarea');
    inputs.forEach(el => {
      if (el.id && el.value && el.type !== 'button' && el.type !== 'submit') {
        params.set(el.id, el.value);
      }
    });
    const docId = new URLSearchParams(window.location.search).get('_docId');
    if (docId) {
      try {
        let docs = JSON.parse(localStorage.getItem('labodoc_docs') || '[]');
        let history = JSON.parse(localStorage.getItem('labodoc_history') || '[]');
        const doc = docs.find(d => d.id === docId);
        if (doc) {
          let finalUrl = './forms/' + window.location.pathname.split('/').pop();
          if ([...params].length > 0) finalUrl += '?' + params.toString();
          history.push({
            id: 'h' + Date.now(), docId: doc.id, docName: doc.name, category: doc.category,
            copies: 1, format: 'A4', orientation: 'portrait', savedUrl: finalUrl, printedAt: new Date().toISOString()
          });
          doc.printCount = (doc.printCount || 0) + 1;
          localStorage.setItem('labodoc_docs', JSON.stringify(docs));
          localStorage.setItem('labodoc_history', JSON.stringify(history));
        }
      } catch(e) { console.error(e); }
    }
    window.print();
  }
</script>
</body>
</html>
